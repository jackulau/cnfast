name: Benchmark Chart

on:
  push:
    branches: [main]
    paths:
      - "packages/fastcn/src/**"
      - "packages/fastcn/bench/**"
      - "packages/fastcn/scripts/**"
      - ".github/workflows/bench-chart.yml"
  workflow_dispatch:

concurrency:
  group: bench-chart-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bench-chart:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Generate benchmark chart
        run: pnpm --filter cnfast bench:chart
        env:
          BENCH_TIME_MS: "500"
          BENCH_BEST_OF: "3"

      - name: Commit updated chart
        run: |
          if git diff --quiet -- packages/fastcn/bench/chart.svg packages/fastcn/bench/latest.json; then
            echo "No chart changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/fastcn/bench/chart.svg packages/fastcn/bench/latest.json
          git commit -m "chore(bench): refresh benchmark chart [skip ci]"
          git push
